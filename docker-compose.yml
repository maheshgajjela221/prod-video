version: '3'

services:
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8088:80"

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8081:8080"

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
