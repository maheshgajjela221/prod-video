version: '3'

services:
  frontend:
    build: ./frontend
    container_name: frontend

  backend:
    build: ./backend
    container_name: backend

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"   # ✅ only port exposed
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
